<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN"
        "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<ui:composition xmlns="http://www.w3.org/1999/xhtml"
                xmlns:ui="jakarta.faces.facelets"
                xmlns:h="jakarta.faces.html"
                xmlns:f="jakarta.faces.core">

    <div class="form-grid">
        <div class="form-row full">
            <h:outputLabel for="dialogDocName" value="Nom document selectionne"/>
            <h:inputText id="dialogDocName" readonly="true"/>
            <h:inputHidden id="dialogTarget"/>
        </div>
        <div class="form-row">
            <h:outputLabel for="dialogCopy" value="Copie"/>
            <h:selectOneMenu id="dialogCopy">
                <f:selectItem itemLabel="Simple" itemValue="simple"/>
                <f:selectItem itemLabel="Conforme" itemValue="conforme"/>
                <f:selectItem itemLabel="Originale" itemValue="originale"/>
            </h:selectOneMenu>
        </div>
        <div class="form-row">
            <h:outputLabel for="dialogNombre" value="Nombre"/>
            <h:inputText id="dialogNombre" />
        </div>
        <div class="form-row full">
            <h:outputLabel for="dialogDesc" value="Description"/>
            <h:inputTextarea id="dialogDesc" rows="3" />
        </div>
        <div class="form-row full">
            <h:outputLabel for="dialogFile" value="Upload fichier"/>
            <div style="display: grid; grid-template-columns: auto 1fr; gap: 10px; align-items: center;">
                <label for="dialogFile" class="upload-btn" style="display:inline-flex;align-items:center;justify-content:center;">Choisir fichier</label>
                <h:inputText id="dialogFileName" readonly="true"/>
                <span id="dialogFileSlot">
                    <input id="dialogFile"
                           name="dialogFile"
                           type="file"
                           style="position:absolute;left:-9999px;width:1px;height:1px;opacity:0;"
                           onchange="btkSyncDialogFile(this)"/>
                </span>
            </div>
        </div>
        <div class="form-actions">
            <button type="button" class="btn-primary" onclick="return btkConfirmDialog(event);">OK</button>
        </div>
    </div>

</ui:composition>
