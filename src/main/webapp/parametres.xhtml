<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN"
        "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<ui:composition xmlns="http://www.w3.org/1999/xhtml"
                xmlns:ui="jakarta.faces.facelets"
                xmlns:h="jakarta.faces.html"
                template="/WEB-INF/templates/app.xhtml">

    <ui:define name="title">BTK - Parametres</ui:define>

    <ui:define name="content">
        <div class="container">
            <div class="card">
                <div class="card-title">Parametres</div>
                <h:link outcome="/ajouter-utilisateur" styleClass="btn-primary"
                        rendered="#{loginBean.userManagementAllowed}"
                        style="display:inline-flex; text-decoration:none;">
                    Ajouter utilisateur
                </h:link>
                <h:link outcome="/modifier-utilisateur" styleClass="btn-primary"
                        rendered="#{loginBean.userManagementAllowed}"
                        style="display:inline-flex; text-decoration:none; margin-left:10px;">
                    Modifier utilisateur
                </h:link>
                <h:link outcome="/liste-utilisateurs" styleClass="btn-primary"
                        rendered="#{loginBean.userManagementAllowed}"
                        style="display:inline-flex; text-decoration:none; margin-left:10px;">
                    Liste utilisateurs
                </h:link>
                <h:panelGroup rendered="#{not loginBean.userManagementAllowed}" layout="block"
                              style="color:#6b839b; font-size:.9rem;">
                    Seul le role Super_admin peut ajouter un utilisateur.
                </h:panelGroup>
            </div>
        </div>
    </ui:define>

</ui:composition>
